<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- boxicon link -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Profile card</title>
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="" alt="dunes and nice weather" class="profile-img">
        </div>

        <div class="personal-data">
            <span class="name">Peter Brunzel</span>
            <span job="name">CS Student</span>
        </div>

        <!-- LinkedIn Button -->
        <div id="media-buttons">
            <a href="#" style="background: blue;" class="link">
                <i class="box-icon"></i>
            </a>
            <!-- Instagram -->
            <a href="#" style="background: pink;" class="link">
                <i class="box-icon"></i>
            </a>

            <!-- Facebook -->
            <a href="#" style="background: pink;" class="link">
                <i class="box-icon"></i>
            </a>

            <!-- Facebook -->
            <a href="#" style="background: #6793fa11;" class="link">
                <i class="box-icon"></i>
            </a>
        </div>

        <div class="buttons">
            <buttons class="button">Message</buttons>
            <buttons class="button">About</buttons>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="likes"></i>
                <span class="number">42K</span>
            </div>

            <div class="data">
                <i class="messages"></i>
                <span class="number">20K</span>
            </div>

            <div class="data">
                <i class="shares"></i>
                <span class="number">12K</span>
            </div>
        </div>
    </div>

    <div class="example">
        <p></p>
        <p>hallo</p>
        <p>sds</p>
        <div><p>
sdsd
        </p></div>
        <ul>
            <li>sjnj</li>
            <li>sjnj</li>
            <li>sjnj</li>
        </ul>
    </div>

</body>

</html>
